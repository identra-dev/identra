name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# A push that lands while the previous one is still building makes the older run pointless.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # The gates, once, on the cheap runner. Nothing here is OS specific, so running it on three
  # machines would just buy the same answer three times.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # No model in CI. A workspace build enables the embedding feature because the app asks for
      # it, and downloading 130MB from a model host on every push is a flake waiting to happen.
      - run: IDENTRA_EMBEDDINGS=off cargo test --workspace
      - name: Frontend
        working-directory: apps/identra-desktop/frontend
        run: |
          bun install --frozen-lockfile
          bun run build
          bun test
      - name: Trace gate
        run: bash scripts/trace-gate.sh

  # The platform code is small (session detection and the macOS auth branch) but it is real, and it
  # is invisible to a Linux build: cfg'd-out code is never type checked. This is the only thing that
  # catches a macOS-only compile error before a Mac user does.
  check-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # No model in CI. A workspace build enables the embedding feature because the app asks for
      # it, and downloading 130MB from a model host on every push is a flake waiting to happen.
      - run: IDENTRA_EMBEDDINGS=off cargo test --workspace

  # Bundles. Linux is built where it runs; macOS has to be built on a Mac, which is the whole reason
  # this workflow exists rather than a local script.
  bundle:
    needs: [check, check-macos]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      # Needed to create the release and attach the bundles to it.
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: ""
            name: linux
            bundles: target/release/bundle
          # Apple Silicon and Intel as one binary, so there is one download and no way to pick wrong.
          - os: macos-latest
            target: universal-apple-darwin
            name: macos
            # A --target build nests its bundles under the triple rather than release/, so the path
            # differs per matrix leg and is not something to hardcode once and get wrong.
            bundles: target/universal-apple-darwin/release/bundle
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: macOS targets
        if: matrix.name == 'macos'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
      - name: System deps
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - name: Frontend deps
        working-directory: apps/identra-desktop/frontend
        run: bun install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/identra-desktop
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
          # A tag publishes, a manual run just builds. Giving these empty on a dispatch is what
          # keeps tauri-action from cutting a release named after whatever branch I ran it from.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Identra {0}', github.ref_name) || '' }}
          # Draft, so a release is something I choose to publish rather than something a tag does to
          # me. Both legs write into the same draft, so it is only complete once Linux and macOS have
          # both landed, and I would rather see that than ship whichever finished first.
          releaseDraft: true
      # Keep the bundles on the run itself as well. A draft release is the download people get; this
      # is what I look at when a build is fine and a tag is not, and it is the only artifact a
      # workflow_dispatch produces at all.
      - uses: actions/upload-artifact@v4
        with:
          name: identra-${{ matrix.name }}
          path: |
            ${{ matrix.bundles }}/appimage/*.AppImage
            ${{ matrix.bundles }}/deb/*.deb
            ${{ matrix.bundles }}/rpm/*.rpm
            ${{ matrix.bundles }}/dmg/*.dmg
          # error, not warn. Each leg now looks only where its own bundles land, so finding nothing
          # means this OS built nothing, which is exactly the failure that shipped a green run with
          # no Mac download attached to it. Never let that be a warning again.
          if-no-files-found: error
